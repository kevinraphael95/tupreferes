<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tu préfères ... ?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;500;700;800&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-left"></div>
    <div class="header-center">
      <h1 class="site-title">TU PRÉFÈRES ...</h1>
      <p class="site-subtitle">Un choix impossible, à chaque fois.</p>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="btnHistoryToggle" aria-label="Voir l'historique" title="Historique">?</button>
      <button class="icon-btn theme-toggle" id="themeToggle" aria-label="Changer de thème">
        <span class="theme-icon-dark">◑</span>
        <span class="theme-icon-light">◐</span>
      </button>
    </div>
  </header>

  <div class="divider-line"></div>

  <main class="main-wrap">

    <div class="loader" id="loader">
      <div class="loader-inner">
        <div class="loader-bar"><div class="loader-fill"></div></div>
        <p class="loader-text">Tirage au sort<span class="ellipsis"></span></p>
      </div>
    </div>

    <section class="arena" id="arena" aria-live="polite"></section>

    <div class="result-strip" id="resultStrip">
      <div class="result-inner">
        <span class="result-label">Tu préfères</span>
        <strong class="result-winner" id="resultWinner">—</strong>
        <span class="result-hint" id="resultHint"></span>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="btnNext" disabled>
        <span>Suivant</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7h12M8 2l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="btn btn-ghost" id="btnReset">Réinitialiser</button>
    </div>

  </main>

  <!-- Drawer historique -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="history-drawer" id="historyPanel" aria-hidden="true">
    <div class="history-drawer-header">
      <span class="history-label">Historique</span>
      <div class="history-drawer-meta">
        <span class="history-count" id="historyCount">0 choix</span>
        <button class="icon-btn" id="btnHistoryClose" aria-label="Fermer">✕</button>
      </div>
    </div>
    <ol class="history-list" id="historyList" reversed></ol>
    <p class="history-empty" id="historyEmpty">Aucun choix pour l'instant.</p>
  </aside>

  <script src="app.js"></script>
</body>
</html>
