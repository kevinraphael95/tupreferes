<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Préfères-tu ?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --card-l: #0f0f1a;
    --card-r: #0f0f1a;
    --accent: #e8c97a;
    --dim: #3a3a5c;
    --text: #e8e8f0;
    --sub: #7a7a9a;
    --vs: #2a2a3f;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 50%, rgba(100,60,200,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 80% 50%, rgba(200,100,60,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  header {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeDown .6s ease both;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  header h1 span { color: var(--accent); }

  header p {
    color: var(--sub);
    font-size: .75rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    margin-top: .75rem;
  }

  .arena {
    display: flex;
    align-items: stretch;
    gap: 0;
    width: 100%;
    max-width: 900px;
    min-height: 420px;
    position: relative;
  }

  .card {
    flex: 1;
    background: var(--card-l);
    border: 1px solid var(--dim);
    display: flex;
    flex-direction: column;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: border-color .25s, transform .15s;
    animation: cardIn .5s ease both;
  }

  .card:first-child { border-radius: 16px 0 0 16px; animation-delay: .1s; }
  .card:last-child  { border-radius: 0 16px 16px 0; animation-delay: .2s; }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(232,201,122,0.05) 0%, transparent 60%);
    opacity: 0;
    transition: opacity .3s;
  }

  .card:hover::before { opacity: 1; }
  .card:hover { border-color: var(--accent); transform: scaleY(1.01); z-index: 2; }

  .card.winner {
    border-color: var(--accent);
    background: linear-gradient(160deg, #1a1a2e 0%, #12121f 100%);
    animation: winPulse .4s ease;
  }

  .card.loser {
    opacity: .35;
    filter: grayscale(.6);
    transform: scale(.97);
    cursor: default;
  }

  .card-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
    border-bottom: 1px solid var(--dim);
    background: var(--vs);
  }

  .card-img-placeholder {
    width: 100%;
    height: 200px;
    background: var(--vs);
    border-bottom: 1px solid var(--dim);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    color: var(--dim);
  }

  .card-body {
    flex: 1;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: .75rem;
  }

  .card-label {
    font-size: .65rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.1rem, 2.5vw, 1.6rem);
    font-weight: 700;
    line-height: 1.25;
    color: var(--text);
  }

  .card-snippet {
    font-size: .75rem;
    color: var(--sub);
    line-height: 1.6;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-link {
    font-size: .65rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--dim);
    text-decoration: none;
    transition: color .2s;
    align-self: flex-start;
  }

  .card-link:hover { color: var(--accent); }

  .vs-divider {
    width: 48px;
    flex-shrink: 0;
    background: var(--vs);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 3;
  }

  .vs-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 900;
    color: var(--sub);
    writing-mode: vertical-rl;
    letter-spacing: .2em;
    transform: rotate(180deg);
  }

  .score-banner {
    margin-top: 2rem;
    text-align: center;
    font-size: .75rem;
    letter-spacing: .15em;
    color: var(--sub);
    text-transform: uppercase;
    min-height: 1.5rem;
    animation: fadeUp .4s ease both;
  }

  .score-banner strong { color: var(--accent); font-size: .95rem; }

  .controls {
    margin-top: 2rem;
    display: flex;
    gap: 1rem;
    animation: fadeUp .5s .2s ease both;
  }

  button {
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--sub);
    font-family: 'DM Mono', monospace;
    font-size: .7rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    padding: .75rem 1.75rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all .2s;
  }

  button:hover { border-color: var(--accent); color: var(--accent); }

  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0a0f;
    font-weight: 500;
  }

  button.primary:hover { background: #f5dc9a; border-color: #f5dc9a; }
  button:disabled { opacity: .3; cursor: default; }

  .loader {
    display: flex;
    gap: .4rem;
    align-items: center;
    justify-content: center;
    height: 420px;
    flex-direction: column;
    gap: 1rem;
  }

  .dots { display: flex; gap: .4rem; }

  .dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce .7s infinite ease-in-out;
  }

  .dot:nth-child(2) { animation-delay: .15s; }
  .dot:nth-child(3) { animation-delay: .3s; }

  .history {
    margin-top: 3rem;
    width: 100%;
    max-width: 900px;
  }

  .history-title {
    font-size: .65rem;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 1rem;
    border-bottom: 1px solid var(--dim);
    padding-bottom: .5rem;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: .4rem;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: .75rem;
    font-size: .7rem;
    color: var(--sub);
    padding: .4rem .6rem;
    border-radius: 6px;
    background: rgba(255,255,255,.02);
    animation: fadeUp .3s ease;
  }

  .history-item .winner-name { color: var(--text); font-weight: 500; }
  .history-item .vs { color: var(--dim); font-size: .6rem; }
  .history-item .loser-name { text-decoration: line-through; opacity: .5; }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:none; } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(10px);  } to { opacity:1; transform:none; } }
  @keyframes cardIn   { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:none; } }
  @keyframes winPulse { 0%{box-shadow:0 0 0 0 rgba(232,201,122,.4)} 70%{box-shadow:0 0 0 12px rgba(232,201,122,0)} 100%{box-shadow:none} }
  @keyframes bounce   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
</style>
</head>
<body>

<header>
  <h1>Préfères<span>-tu</span> ?</h1>
  <p>Deux pages Wikipedia au hasard — laquelle retiens-tu ?</p>
</header>

<div id="main" class="arena" style="display:none"></div>
<div id="loader" class="loader">
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <p style="color:var(--sub);font-size:.7rem;letter-spacing:.1em">Chargement…</p>
</div>

<div class="score-banner" id="score"></div>

<div class="controls">
  <button class="primary" id="btn-next" onclick="nextRound()" disabled>Suivant →</button>
  <button id="btn-reset" onclick="reset()">Réinitialiser</button>
</div>

<div class="history" id="history-section" style="display:none">
  <div class="history-title">Historique</div>
  <div class="history-list" id="history-list"></div>
</div>

<script>
  const LANG = 'fr';
  const API = `https://${LANG}.wikipedia.org/api/rest_v1`;

  let chosen = false;
  let history = [];
  let pages = [null, null];

  async function fetchRandom() {
    const r = await fetch(`${API}/page/random/summary`);
    const d = await r.json();
    return {
      title: d.title,
      description: d.description || '',
      extract: d.extract || '',
      image: d.thumbnail?.source || null,
      url: d.content_urls?.desktop?.page || `https://${LANG}.wikipedia.org/wiki/${encodeURIComponent(d.title)}`
    };
  }

  async function loadRound() {
    chosen = false;
    document.getElementById('loader').style.display = 'flex';
    document.getElementById('main').style.display = 'none';
    document.getElementById('btn-next').disabled = true;
    document.getElementById('score').textContent = '';

    try {
      pages = await Promise.all([fetchRandom(), fetchRandom()]);
    } catch(e) {
      // retry
      pages = await Promise.all([fetchRandom(), fetchRandom()]);
    }

    renderCards();
  }

  function renderCards() {
    const main = document.getElementById('main');
    main.innerHTML = '';

    pages.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.index = i;

      let imgEl = '';
      if (p.image) {
        imgEl = `<img class="card-img" src="${p.image}" alt="${p.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                 <div class="card-img-placeholder" style="display:none">📄</div>`;
      } else {
        imgEl = `<div class="card-img-placeholder">📄</div>`;
      }

      card.innerHTML = `
        ${imgEl}
        <div class="card-body">
          <div class="card-label">${i === 0 ? 'Option A' : 'Option B'}</div>
          <div class="card-title">${p.title}</div>
          ${p.description ? `<div class="card-snippet">${p.description}</div>` : ''}
          ${p.extract && !p.description ? `<div class="card-snippet">${p.extract}</div>` : ''}
          <a class="card-link" href="${p.url}" target="_blank" rel="noopener">↗ Wikipedia</a>
        </div>
      `;

      card.addEventListener('click', () => choose(i));
      main.appendChild(card);

      if (i === 0) {
        const vs = document.createElement('div');
        vs.className = 'vs-divider';
        vs.innerHTML = `<span class="vs-text">VS</span>`;
        main.appendChild(vs);
      }
    });

    document.getElementById('loader').style.display = 'none';
    document.getElementById('main').style.display = 'flex';
  }

  function choose(idx) {
    if (chosen) return;
    chosen = true;

    const cards = document.querySelectorAll('.card');
    cards[idx].classList.add('winner');
    cards[1 - idx].classList.add('loser');

    document.getElementById('btn-next').disabled = false;

    const winner = pages[idx];
    const loser = pages[1 - idx];

    document.getElementById('score').innerHTML =
      `Tu préfères <strong>${winner.title}</strong>`;

    history.unshift({ winner: winner.title, loser: loser.title });
    renderHistory();
  }

  function renderHistory() {
    if (!history.length) return;
    const section = document.getElementById('history-section');
    const list = document.getElementById('history-list');
    section.style.display = 'block';
    list.innerHTML = history.slice(0, 10).map((h, i) =>
      `<div class="history-item">
        <span style="color:var(--dim);font-size:.6rem">#${history.length - i}</span>
        <span class="winner-name">${h.winner}</span>
        <span class="vs">vs</span>
        <span class="loser-name">${h.loser}</span>
      </div>`
    ).join('');
  }

  function nextRound() {
    if (!chosen) return;
    loadRound();
  }

  function reset() {
    history = [];
    document.getElementById('history-section').style.display = 'none';
    document.getElementById('history-list').innerHTML = '';
    loadRound();
  }

  loadRound();
</script>
</body>
</html>
