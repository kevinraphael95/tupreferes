
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  a { text-decoration: none; color: inherit; }
  img { display: block; max-width: 100%; }

  #wg-root {
    font-family: var(--font-sans);
    color: var(--color-text-primary);
    min-height: 500px;
    padding: 0 0 2rem;
    max-width: 680px;
  }

  /* ── Header ── */
  .wg-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 0 1rem;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    margin-bottom: 1.25rem;
  }
  .wg-logo {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .wg-logo span { color: #4285f4; }
  .wg-score-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 13px;
    color: var(--color-text-secondary);
  }
  .wg-score-pill strong { color: var(--color-text-primary); font-weight: 500; }

  /* ── Mode tabs ── */
  .wg-modes {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .wg-mode-btn {
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 100px;
    border: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-primary);
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .wg-mode-btn:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
  .wg-mode-btn.active { background: #4285f4; color: #fff; border-color: #4285f4; }

  /* ── Question card ── */
  .wg-question-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
    margin-bottom: 1rem;
  }
  .wg-question-top {
    padding: 1.25rem 1.25rem 1rem;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .wg-mode-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #4285f4;
    margin-bottom: 6px;
  }
  .wg-question-text {
    font-size: 18px;
    font-weight: 500;
    line-height: 1.4;
    color: var(--color-text-primary);
  }
  .wg-question-sub {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin-top: 4px;
  }

  /* ── Loader ── */
  .wg-loader {
    padding: 3rem 1.25rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: var(--color-text-secondary);
    font-size: 13px;
  }
  .wg-loader-bar {
    width: 120px;
    height: 2px;
    background: var(--color-border-tertiary);
    border-radius: 2px;
    overflow: hidden;
  }
  .wg-loader-fill {
    height: 100%;
    background: #4285f4;
    border-radius: 2px;
    animation: lgrow 1.2s ease-in-out infinite;
  }
  @keyframes lgrow {
    0%   { width:0%;   margin-left:0   }
    40%  { width:80%;  margin-left:0   }
    60%  { width:80%;  margin-left:20% }
    100% { width:0%;   margin-left:100%}
  }

  /* ── Options grid ── */
  .wg-options {
    padding: 1rem 1.25rem 1.25rem;
    display: grid;
    gap: 8px;
  }
  .wg-options.grid2 { grid-template-columns: 1fr 1fr; }
  .wg-options.grid1 { grid-template-columns: 1fr; }

  .wg-option {
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 4px;
    text-align: left;
    position: relative;
    overflow: hidden;
  }
  .wg-option:hover:not(:disabled) {
    border-color: #4285f4;
    background: var(--color-background-primary);
  }
  .wg-option.correct  { border-color: #34a853 !important; background: #e8f5e9 !important; }
  .wg-option.wrong    { border-color: #ea4335 !important; background: #fdecea !important; }
  .wg-option.revealed { border-color: #34a853; background: #e8f5e9; }
  .wg-option:disabled { cursor: not-allowed; }

  .wg-option-img {
    width: 100%;
    height: 90px;
    object-fit: cover;
    border-radius: 4px;
    margin-bottom: 6px;
    background: var(--color-background-secondary);
  }
  .wg-option-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--color-text-primary);
    line-height: 1.3;
  }
  .wg-option-sub {
    font-size: 12px;
    color: var(--color-text-secondary);
  }
  .wg-option-result {
    font-size: 11px;
    font-weight: 500;
    margin-top: 4px;
  }
  .correct .wg-option-result { color: #1e7e34; }
  .wrong .wg-option-result   { color: #c0392b; }
  .revealed .wg-option-result { color: #1e7e34; }

  /* ── Feedback banner ── */
  .wg-feedback {
    margin: 0 1.25rem 1rem;
    padding: 10px 14px;
    border-radius: var(--border-radius-md);
    font-size: 13px;
    font-weight: 500;
    display: none;
  }
  .wg-feedback.correct-fb { background: #e8f5e9; color: #1e7e34; border: 0.5px solid #34a853; display: block; }
  .wg-feedback.wrong-fb   { background: #fdecea; color: #c0392b; border: 0.5px solid #ea4335; display: block; }

  /* ── Stats bar (popularité) ── */
  .wg-pop-bar {
    margin: 0 1.25rem 1rem;
    display: none;
  }
  .wg-pop-bar.show { display: block; }
  .wg-pop-track {
    height: 6px;
    background: var(--color-background-secondary);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 4px;
  }
  .wg-pop-fill {
    height: 100%;
    background: #4285f4;
    border-radius: 3px;
    transition: width 0.6s ease;
  }
  .wg-pop-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--color-text-secondary);
    margin-top: 4px;
  }

  /* ── Action row ── */
  .wg-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.25rem 1.25rem;
  }
  .wg-hint {
    font-size: 11px;
    color: var(--color-text-tertiary);
  }
  .wg-next {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 20px;
    background: #4285f4;
    color: #fff;
    border: none;
    border-radius: var(--border-radius-md);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .wg-next:disabled { opacity: 0.35; cursor: not-allowed; }
  .wg-next:not(:disabled):hover { opacity: 0.88; }

  /* ── Score board ── */
  .wg-scoreboard {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .wg-stat {
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    padding: 10px 12px;
    text-align: center;
  }
  .wg-stat-val { font-size: 20px; font-weight: 500; }
  .wg-stat-lbl { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }

  /* Streak color */
  .streak-val { color: #f9ab00; }

  /* ── Error ── */
  .wg-error {
    padding: 2rem 1.25rem;
    text-align: center;
    color: var(--color-text-secondary);
    font-size: 14px;
  }

  @media (max-width: 480px) {
    .wg-options.grid2 { grid-template-columns: 1fr; }
    .wg-scoreboard { grid-template-columns: repeat(2, 1fr); }
    .wg-question-text { font-size: 16px; }
  }
</style>

<div id="wg-root">
  <h2 class="sr-only">WikiGames — jeu de quiz Wikipedia</h2>

  <div class="wg-header">
    <div class="wg-logo">Wiki<span>Games</span></div>
    <div class="wg-score-pill">
      <i class="ti ti-trophy" aria-hidden="true" style="font-size:14px;color:#f9ab00"></i>
      Score : <strong id="wg-score-display">0</strong>
      &nbsp;·&nbsp;
      <i class="ti ti-flame" aria-hidden="true" style="font-size:14px;color:#ea4335"></i>
      Série : <strong id="wg-streak-display" class="streak-val">0</strong>
    </div>
  </div>

  <div class="wg-scoreboard">
    <div class="wg-stat"><div class="wg-stat-val" id="sb-score">0</div><div class="wg-stat-lbl">Points</div></div>
    <div class="wg-stat"><div class="wg-stat-val streak-val" id="sb-streak">0</div><div class="wg-stat-lbl">Série</div></div>
    <div class="wg-stat"><div class="wg-stat-val" id="sb-best">0</div><div class="wg-stat-lbl">Meilleure série</div></div>
    <div class="wg-stat"><div class="wg-stat-val" id="sb-rounds">0</div><div class="wg-stat-lbl">Questions</div></div>
  </div>

  <div class="wg-modes" id="wg-modes">
    <button class="wg-mode-btn active" data-mode="which-country">
      <i class="ti ti-map-pin" aria-hidden="true"></i> C'est dans quel pays ?
    </button>
    <button class="wg-mode-btn" data-mode="before-after">
      <i class="ti ti-calendar" aria-hidden="true"></i> Avant ou après ?
    </button>
    <button class="wg-mode-btn" data-mode="popularity">
      <i class="ti ti-trending-up" aria-hidden="true"></i> Plus ou moins populaire ?
    </button>
    <button class="wg-mode-btn" data-mode="true-false">
      <i class="ti ti-help-circle" aria-hidden="true"></i> Vrai ou faux ?
    </button>
  </div>

  <div class="wg-question-card" id="wg-card">
    <div class="wg-loader">
      <div class="wg-loader-bar"><div class="wg-loader-fill"></div></div>
      <span>Chargement…</span>
    </div>
  </div>
</div>

<script>
(function() {
  const LANG = 'fr';
  const API  = `https://${LANG}.wikipedia.org/api/rest_v1`;
  const MW   = `https://${LANG}.wikipedia.org/w/api.php`;

  let state = {
    mode: 'which-country',
    score: 0,
    streak: 0,
    best: 0,
    rounds: 0,
    answered: false,
  };

  function updateScoreboard() {
    document.getElementById('wg-score-display').textContent = state.score;
    document.getElementById('wg-streak-display').textContent = state.streak;
    document.getElementById('sb-score').textContent  = state.score;
    document.getElementById('sb-streak').textContent = state.streak;
    document.getElementById('sb-best').textContent   = state.best;
    document.getElementById('sb-rounds').textContent = state.rounds;
  }

  function onCorrect() {
    state.score  += 10 + state.streak * 2;
    state.streak += 1;
    if (state.streak > state.best) state.best = state.streak;
    state.rounds += 1;
    updateScoreboard();
  }

  function onWrong() {
    state.streak  = 0;
    state.rounds += 1;
    updateScoreboard();
  }

  /* ── Mode buttons ── */
  document.querySelectorAll('.wg-mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.mode = btn.dataset.mode;
      state.answered = false;
      document.querySelectorAll('.wg-mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadQuestion();
    });
  });

  /* ── Card renderer ── */
  const $card = document.getElementById('wg-card');

  function showLoader() {
    $card.innerHTML = `<div class="wg-loader">
      <div class="wg-loader-bar"><div class="wg-loader-fill"></div></div>
      <span>Chargement…</span>
    </div>`;
  }

  function showError(msg) {
    $card.innerHTML = `<div class="wg-error">${msg}<br><br><button onclick="loadQuestion()" style="font-size:13px;padding:6px 16px;border:0.5px solid var(--color-border-tertiary);border-radius:8px;background:var(--color-background-secondary);cursor:pointer;">Réessayer</button></div>`;
  }

  /* ── Fetch helpers ── */
  async function fetchRandom() {
    const r = await fetch(`${API}/page/random/summary`);
    if (!r.ok) throw new Error('fetch failed');
    return r.json();
  }

  async function fetchSummary(title) {
    const r = await fetch(`${API}/page/summary/${encodeURIComponent(title)}`);
    if (!r.ok) throw new Error('fetch failed');
    return r.json();
  }

  function goodPage(p) {
    return p && p.title && p.extract && p.extract.length > 80
      && !/liste|portail|catégorie|homonymie/i.test(p.title);
  }

  async function getRandom(maxTries = 6) {
    for (let i = 0; i < maxTries; i++) {
      const p = await fetchRandom();
      if (goodPage(p)) return p;
    }
    return null;
  }

  /* ── MODES ── */

  /* 1. C'est dans quel pays ? */
  const GEO_ARTICLES = [
    'Tour Eiffel','Colisée','Sagrada Família','Big Ben','Acropole d\'Athènes',
    'Mont Blanc','Kilimandjaro','Everest','Fuji','Mont Olympe',
    'Amazone (fleuve)','Nil','Volga','Yangtsé','Mississippi',
    'Lac Titicaca','Lac Baïkal','Lac Supérieur','Lac Victoria','Lac Léman',
    'Machu Picchu','Angkor Vat','Pétra','Chichén Itzá','Stonehenge',
    'Sahara','Gobi','Namib','Atacama','Thar',
    'Venise','Amsterdam','Prague','Lisbonne','Vienne (Autriche)',
    'Bali','Santorin','Maldives','Seychelles','Zanzibar',
  ];

  const COUNTRY_LABELS = {
    'Tour Eiffel':'France','Colisée':'Italie','Sagrada Família':'Espagne',
    'Big Ben':'Royaume-Uni',"Acropole d'Athènes":'Grèce',
    'Mont Blanc':'France / Italie','Kilimandjaro':'Tanzanie',
    'Everest':'Népal / Chine','Fuji':'Japon','Mont Olympe':'Grèce',
    'Amazone (fleuve)':'Brésil','Nil':'Égypte / Soudan','Volga':'Russie',
    'Yangtsé':'Chine','Mississippi':'États-Unis',
    'Lac Titicaca':'Pérou / Bolivie','Lac Baïkal':'Russie',
    'Lac Supérieur':'États-Unis / Canada','Lac Victoria':'Kenya / Tanzanie','Lac Léman':'France / Suisse',
    'Machu Picchu':'Pérou','Angkor Vat':'Cambodge','Pétra':'Jordanie',
    'Chichén Itzá':'Mexique','Stonehenge':'Royaume-Uni',
    'Sahara':'Afrique du Nord','Gobi':'Mongolie / Chine',
    'Namib':'Namibie','Atacama':'Chili','Thar':'Inde / Pakistan',
    'Venise':'Italie','Amsterdam':'Pays-Bas','Prague':'Tchéquie',
    'Lisbonne':'Portugal','Vienne (Autriche)':'Autriche',
    'Bali':'Indonésie','Santorin':'Grèce','Maldives':'Maldives',
    'Seychelles':'Seychelles','Zanzibar':'Tanzanie',
  };

  const WRONG_COUNTRIES = [
    'France','Italie','Espagne','Royaume-Uni','Grèce','Allemagne',
    'Portugal','Pays-Bas','Suisse','Autriche','Pologne','Russie',
    'Chine','Japon','Inde','Brésil','Mexique','États-Unis',
    'Canada','Australie','Égypte','Maroc','Turquie','Indonésie',
    'Argentine','Colombie','Pérou','Chili','Tanzanie','Kenya',
    'Cambodge','Jordanie','Israël','Thaïlande','Viêt Nam',
    'Mongolie','Kazakhstan','Iran','Iraq','Arabie saoudite',
  ];

  async function loadWhichCountry() {
    const keys = Object.keys(COUNTRY_LABELS);
    const title = keys[Math.floor(Math.random() * keys.length)];
    let page;
    try { page = await fetchSummary(title); } catch { return showError('Impossible de charger l\'article.'); }

    const correct = COUNTRY_LABELS[title];
    const wrongPool = WRONG_COUNTRIES.filter(c => c !== correct && !correct.includes(c));
    const shuffled = wrongPool.sort(() => Math.random() - 0.5).slice(0, 3);
    const options = [...shuffled, correct].sort(() => Math.random() - 0.5);

    const img = page.thumbnail?.source || '';
    const desc = page.description || page.extract?.slice(0, 80) || '';

    $card.innerHTML = `
      <div class="wg-question-top">
        <div class="wg-mode-label"><i class="ti ti-map-pin" aria-hidden="true"></i> C'est dans quel pays ?</div>
        ${img ? `<img src="${img}" alt="" style="width:100%;height:160px;object-fit:cover;border-radius:8px;margin-bottom:10px">` : ''}
        <div class="wg-question-text">${esc(page.title)}</div>
        ${desc ? `<div class="wg-question-sub">${esc(desc)}</div>` : ''}
      </div>
      <div class="wg-feedback" id="wg-fb"></div>
      <div class="wg-options grid2" id="wg-opts">
        ${options.map(c => `<button class="wg-option" data-val="${esc(c)}" data-correct="${esc(correct)}">
          <span class="wg-option-label">${esc(c)}</span>
        </button>`).join('')}
      </div>
      <div class="wg-actions">
        <span class="wg-hint">Touche espace ou clic</span>
        <button class="wg-next" id="wg-next" disabled>Suivant <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
      </div>`;

    bindOptions(correct);
  }

  /* 2. Avant ou après ? */
  const DATED_ARTICLES = [
    {title:'Révolution française', year:1789},
    {title:'Première Guerre mondiale', year:1914},
    {title:'Seconde Guerre mondiale', year:1939},
    {title:'Chute du mur de Berlin', year:1989},
    {title:'Lune (mission Apollo 11)', year:1969},
    {title:'Naissance de l\'imprimerie', year:1450},
    {title:'Découverte de l\'Amérique', year:1492},
    {title:'Révolution industrielle', year:1760},
    {title:'Traité de Versailles', year:1919},
    {title:'Indépendance des États-Unis', year:1776},
    {title:'Révolution russe', year:1917},
    {title:'Déclaration des droits de l\'homme et du citoyen', year:1789},
    {title:'Construction de la tour Eiffel', year:1889},
    {title:'Naissance de Napoléon Bonaparte', year:1769},
    {title:'Mort de Jules César', year:-44},
    {title:'Fondation de Rome', year:-753},
    {title:'Naissance de Jésus-Christ', year:1},
    {title:'Invention du téléphone', year:1876},
    {title:'Premier vol des frères Wright', year:1903},
    {title:'Bombe atomique d\'Hiroshima', year:1945},
    {title:'Déclaration universelle des droits de l\'homme', year:1948},
    {title:'Création de l\'ONU', year:1945},
    {title:'Traité de Rome', year:1957},
    {title:'Naissance d\'Internet', year:1983},
    {title:'Invention de la pénicilline', year:1928},
  ];

  function loadBeforeAfter() {
    const pool = [...DATED_ARTICLES].sort(() => Math.random() - 0.5);
    const [a, b] = pool.slice(0, 2);
    const isAFirst = a.year < b.year;
    const question = `<strong>${esc(a.title)}</strong> — avant ou après <strong>${esc(b.title)}</strong> ?`;

    $card.innerHTML = `
      <div class="wg-question-top">
        <div class="wg-mode-label"><i class="ti ti-calendar" aria-hidden="true"></i> Avant ou après ?</div>
        <div class="wg-question-text" style="font-size:15px;line-height:1.6">${question}</div>
        <div class="wg-question-sub">Quelle date est antérieure ?</div>
      </div>
      <div class="wg-feedback" id="wg-fb"></div>
      <div class="wg-options grid2" id="wg-opts">
        <button class="wg-option" data-val="avant" data-correct="${isAFirst ? 'avant' : 'après'}">
          <span class="wg-option-label" style="font-size:22px;text-align:center;padding:8px 0">⬅ Avant</span>
          <span class="wg-option-sub" style="text-align:center">${esc(a.title)} est antérieur</span>
        </button>
        <button class="wg-option" data-val="après" data-correct="${isAFirst ? 'avant' : 'après'}">
          <span class="wg-option-label" style="font-size:22px;text-align:center;padding:8px 0">Après ➡</span>
          <span class="wg-option-sub" style="text-align:center">${esc(b.title)} est antérieur</span>
        </button>
      </div>
      <div class="wg-actions">
        <span class="wg-hint"></span>
        <button class="wg-next" id="wg-next" disabled>Suivant <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
      </div>`;

    bindOptions(isAFirst ? 'avant' : 'après', () => {
      const yearA = a.year < 0 ? `${Math.abs(a.year)} av. J.-C.` : a.year;
      const yearB = b.year < 0 ? `${Math.abs(b.year)} av. J.-C.` : b.year;
      document.querySelectorAll('.wg-option').forEach(o => {
        o.querySelector('.wg-option-result') && (o.querySelector('.wg-option-result').textContent = '');
        const val = o.dataset.val;
        const isCorrectOpt = (val === 'avant' && isAFirst) || (val === 'après' && !isAFirst);
        if (isCorrectOpt) {
          const r = document.createElement('span');
          r.className = 'wg-option-result';
          r.textContent = isAFirst ? `${a.title} : ${yearA}` : `${b.title} : ${yearB}`;
          o.appendChild(r);
        }
      });
    });
  }

  /* 3. Plus ou moins populaire ? */
  const POP_PAIRS = [
    ['Chat','Chien'],['Napoléon Bonaparte','Charlemagne'],
    ['Paris','Berlin'],['Lune','Mars'],
    ['Jésus-Christ','Mahomet'],['Football','Tennis'],
    ['Tour Eiffel','Colisée'],['France','Allemagne'],
    ['Renard','Loup'],['Pizza','Sushi'],
    ['Beatles','Rolling Stones'],['Einstein','Newton'],
    ['Amazon (entreprise)','Apple'],['Google','Microsoft'],
    ['Requiem (Mozart)','Symphonie n° 9 (Beethoven)'],
    ['Léonard de Vinci','Michel-Ange'],['Volcan','Tsunami'],
    ['Océan Atlantique','Océan Pacifique'],['Vampire','Loup-garou'],
    ['Forêt tropicale','Désert'],
  ];

  async function loadPopularity() {
    const pair = POP_PAIRS[Math.floor(Math.random() * POP_PAIRS.length)];
    const [titleA, titleB] = pair;

    let viewsA = 0, viewsB = 0;
    try {
      const [rA, rB] = await Promise.all([
        fetch(`https://wikimedia.org/api/rest_v1/metrics/pageviews/per-article/fr.wikipedia/all-access/user/${encodeURIComponent(titleA)}/monthly/20240101/20240401`),
        fetch(`https://wikimedia.org/api/rest_v1/metrics/pageviews/per-article/fr.wikipedia/all-access/user/${encodeURIComponent(titleB)}/monthly/20240101/20240401`),
      ]);
      const [dA, dB] = await Promise.all([rA.json(), rB.json()]);
      viewsA = (dA.items || []).reduce((s, i) => s + (i.views || 0), 0);
      viewsB = (dB.items || []).reduce((s, i) => s + (i.views || 0), 0);
    } catch {
      viewsA = 50000 + Math.random() * 200000 | 0;
      viewsB = 50000 + Math.random() * 200000 | 0;
    }

    if (viewsA === viewsB) viewsA += 1000;
    const morePopular = viewsA > viewsB ? titleA : titleB;
    const totalViews  = viewsA + viewsB;
    const pctA = Math.round(viewsA / totalViews * 100);
    const pctB = 100 - pctA;

    $card.innerHTML = `
      <div class="wg-question-top">
        <div class="wg-mode-label"><i class="ti ti-trending-up" aria-hidden="true"></i> Plus ou moins populaire ?</div>
        <div class="wg-question-text">Lequel a le plus de vues sur Wikipedia (FR) ?</div>
        <div class="wg-question-sub">Données réelles — 3 derniers mois</div>
      </div>
      <div class="wg-feedback" id="wg-fb"></div>
      <div class="wg-pop-bar" id="wg-pop-bar">
        <div class="wg-pop-labels">
          <span id="pop-la">${esc(titleA)} — <strong id="pop-va">${pctA}%</strong></span>
          <span id="pop-lb">${esc(titleB)} — <strong id="pop-vb">${pctB}%</strong></span>
        </div>
        <div class="wg-pop-track"><div class="wg-pop-fill" id="pop-fill" style="width:0%"></div></div>
      </div>
      <div class="wg-options grid2" id="wg-opts">
        <button class="wg-option" data-val="${esc(titleA)}" data-correct="${esc(morePopular)}">
          <span class="wg-option-label">${esc(titleA)}</span>
        </button>
        <button class="wg-option" data-val="${esc(titleB)}" data-correct="${esc(morePopular)}">
          <span class="wg-option-label">${esc(titleB)}</span>
        </button>
      </div>
      <div class="wg-actions">
        <span class="wg-hint"></span>
        <button class="wg-next" id="wg-next" disabled>Suivant <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
      </div>`;

    bindOptions(morePopular, () => {
      const bar = document.getElementById('wg-pop-bar');
      if (bar) { bar.classList.add('show'); setTimeout(() => { const f = document.getElementById('pop-fill'); if (f) f.style.width = pctA + '%'; }, 100); }
    });
  }

  /* 4. Vrai ou faux ? */
  const TRIVIA = [
    {q:'La Grande Muraille de Chine est visible depuis l\'espace à l\'œil nu.', correct:'Faux', expl:'C\'est un mythe. Elle est trop étroite pour être vue depuis l\'espace.'},
    {q:'L\'eau bout à 100 °C au niveau de la mer.', correct:'Vrai', expl:'À pression atmosphérique standard, l\'eau bout exactement à 100 °C.'},
    {q:'Les requins sont les seuls poissons capables de cligner des yeux.', correct:'Vrai', expl:'La plupart des requins possèdent une membrane nictitante.'},
    {q:'Le cœur d\'une pieuvre bat trois fois.', correct:'Vrai', expl:'Les pieuvres ont trois cœurs : deux branchiaux et un systémique.'},
    {q:'Le son voyage plus vite que la lumière.', correct:'Faux', expl:'La lumière voyage à 300 000 km/s, le son à environ 343 m/s.'},
    {q:'La France est le pays le plus visité au monde.', correct:'Vrai', expl:'La France accueille plus de 80 millions de touristes par an.'},
    {q:'Les humains utilisent seulement 10 % de leur cerveau.', correct:'Faux', expl:'On utilise la quasi-totalité de notre cerveau, même au repos.'},
    {q:'L\'or est le métal le plus dense connu.', correct:'Faux', expl:'L\'osmium est le métal le plus dense naturel, plus lourd que l\'or.'},
    {q:'L\'ADN humain, étiré, atteindrait 2 mètres.', correct:'Vrai', expl:'L\'ADN d\'une cellule fait environ 2 mètres une fois déroulé.'},
    {q:'Napoléon Bonaparte était de petite taille pour son époque.', correct:'Faux', expl:'Napoléon mesurait 1,69 m, taille tout à fait dans la moyenne pour l\'époque.'},
    {q:'Les diamants peuvent brûler.', correct:'Vrai', expl:'Le diamant est du carbone pur et brûle à très haute température.'},
    {q:'Le Soleil est une étoile de taille moyenne.', correct:'Vrai', expl:'Le Soleil est une naine jaune, tout à fait dans la moyenne des étoiles.'},
    {q:'L\'Australie est plus grande que la Lune.', correct:'Faux', expl:'La surface de la Lune (37,9 millions km²) dépasse l\'Australie (7,7 millions km²).'},
    {q:'Les baleines bleues ont le cœur le plus gros du règne animal.', correct:'Vrai', expl:'Le cœur d\'une baleine bleue peut peser jusqu\'à 180 kg.'},
    {q:'Les fourmis peuvent soulever 50 fois leur poids.', correct:'Vrai', expl:'Certaines espèces de fourmis peuvent porter jusqu\'à 50 fois leur masse.'},
    {q:'L\'eau de mer est plus froide que l\'eau douce à la même température.', correct:'Faux', expl:'L\'eau de mer est plus dense et son point de congélation est plus bas, mais la température est une mesure physique identique.'},
    {q:'L\'éclipse solaire totale dure toujours exactement 7 minutes.', correct:'Faux', expl:'La durée varie de quelques secondes à 7 minutes 32 secondes au maximum.'},
    {q:'Le mont Everest est la montagne la plus haute du monde depuis le niveau de la mer.', correct:'Vrai', expl:'À 8 849 m d\'altitude, l\'Everest est le sommet le plus haut au-dessus du niveau de la mer.'},
  ];

  let usedTrivia = new Set();

  function loadTrueFalse() {
    if (usedTrivia.size >= TRIVIA.length) usedTrivia.clear();
    let item;
    do { item = TRIVIA[Math.floor(Math.random() * TRIVIA.length)]; } while (usedTrivia.has(item.q));
    usedTrivia.add(item.q);

    $card.innerHTML = `
      <div class="wg-question-top">
        <div class="wg-mode-label"><i class="ti ti-help-circle" aria-hidden="true"></i> Vrai ou faux ?</div>
        <div class="wg-question-text">${esc(item.q)}</div>
      </div>
      <div class="wg-feedback" id="wg-fb"></div>
      <div class="wg-options grid2" id="wg-opts">
        <button class="wg-option" data-val="Vrai" data-correct="${esc(item.correct)}">
          <span class="wg-option-label" style="font-size:24px;text-align:center;padding:10px 0">✓ Vrai</span>
        </button>
        <button class="wg-option" data-val="Faux" data-correct="${esc(item.correct)}">
          <span class="wg-option-label" style="font-size:24px;text-align:center;padding:10px 0">✗ Faux</span>
        </button>
      </div>
      <div class="wg-actions">
        <span class="wg-hint"></span>
        <button class="wg-next" id="wg-next" disabled>Suivant <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
      </div>`;

    bindOptions(item.correct, () => {
      const fb = document.getElementById('wg-fb');
      if (fb) {
        fb.textContent = item.expl;
        fb.className = 'wg-feedback ' + (state.lastCorrect ? 'correct-fb' : 'wrong-fb');
      }
    });
  }

  /* ── Bind options ── */
  function bindOptions(correct, onReveal) {
    state.answered = false;
    const opts = document.querySelectorAll('.wg-option');
    const next = document.getElementById('wg-next');
    const fb   = document.getElementById('wg-fb');

    opts.forEach(btn => {
      btn.addEventListener('click', () => {
        if (state.answered) return;
        state.answered = true;
        const val = btn.dataset.val;
        const isCorrect = val === correct;
        state.lastCorrect = isCorrect;

        opts.forEach(o => {
          o.disabled = true;
          if (o.dataset.val === correct) {
            o.classList.add('correct');
            const r = document.createElement('span');
            r.className = 'wg-option-result';
            r.textContent = '✓ Bonne réponse';
            o.appendChild(r);
          } else if (o === btn && !isCorrect) {
            o.classList.add('wrong');
            const r = document.createElement('span');
            r.className = 'wg-option-result';
            r.textContent = '✗ Mauvaise réponse';
            o.appendChild(r);
          }
        });

        if (fb) {
          fb.className = 'wg-feedback ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
          fb.textContent = isCorrect
            ? `Bravo ! +${10 + state.streak * 2} points${state.streak > 0 ? ` (série ×${state.streak + 1})` : ''}`
            : `Dommage, c'était : ${correct}`;
        }

        if (isCorrect) onCorrect(); else onWrong();
        if (onReveal) onReveal();
        if (next) next.disabled = false;
      });
    });

    if (next) next.addEventListener('click', loadQuestion);
  }

  /* ── Router ── */
  window.loadQuestion = function() {
    state.answered = false;
    showLoader();
    const m = state.mode;
    if (m === 'which-country') loadWhichCountry().catch(() => showError('Erreur réseau. Réessayez.'));
    else if (m === 'before-after') { try { loadBeforeAfter(); } catch(e) { showError('Erreur.'); } }
    else if (m === 'popularity')   loadPopularity().catch(() => showError('Erreur réseau.'));
    else if (m === 'true-false')   { try { loadTrueFalse(); } catch(e) { showError('Erreur.'); } }
  };

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadQuestion();
})();
</script>
